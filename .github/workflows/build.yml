name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-debian:
    name: Build on Debian
    runs-on: ubuntu-latest
    container: debian:bookworm
    steps:
      - name: Install dependencies
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            meson \
            ninja-build \
            valac \
            pkg-config \
            libglib2.0-dev \
            libgtk-3-dev \
            libxfce4panel-2.0-dev \
            libxfce4ui-2-dev \
            libxfconf-0-dev

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: meson setup build

      - name: Compile
        run: meson compile -C build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-bluetooth-debian
          path: build/src/libnova-bluetooth.so

  build-fedora:
    name: Build on Fedora
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Install dependencies
        run: |
          dnf install -y \
            gcc \
            meson \
            ninja-build \
            vala \
            pkg-config \
            glib2-devel \
            gtk3-devel \
            xfce4-panel-devel \
            libxfce4ui-devel \
            xfconf-devel

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: meson setup build

      - name: Compile
        run: meson compile -C build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-bluetooth-fedora
          path: build/src/libnova-bluetooth.so

  build-archlinux:
    name: Build on Arch Linux
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed \
            base-devel \
            meson \
            vala \
            glib2 \
            gtk3 \
            xfce4-panel \
            libxfce4ui \
            xfconf

      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: meson setup build

      - name: Compile
        run: meson compile -C build

      - name: Build package
        run: |
          cd pkg/archlinux
          makepkg --noconfirm -sf || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: nova-bluetooth-archlinux
          path: build/src/libnova-bluetooth.so
